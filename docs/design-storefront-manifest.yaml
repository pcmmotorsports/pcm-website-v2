# OD 商品頁改造線(2026-06-02 起、Claude-Code 自驅 OD-* 線、寫審分離 ROLE=A)
# 視覺真權威遷移:ProductPage 家族(ProductPage / ProductGallery / ProductInfo / ProductServices /
#   ProductHighlights / ProductSpotlight / ProductTabs + 新增 swatch wall / FAQ / fitments table)
#   由 design-reference/ 改基準到 OD 模板。下方各元件 design: 段(指向 design-reference)隨 OD-* 逐片
#   reskin 被 supersede、未改的片暫保留舊 mapping;不誤判為 drift。
od_redesign:
  authority_project: "open-design: Website V2"
  authority_template: "product-detail-rpm-template.html"   # active 視覺真權威(鐵則 1 直接搬)
  authority_handoff: "HANDOFF-rpm-template.md"              # 十三節規格 + selector 對照
  line: "OD-* (Claude-Code 自驅、寫審分離 ROLE=A、審查 session 哨兵盯 dev)"
  decisions:
    - "決定一=A:OD=商品頁視覺真權威、改造現有 Next.js 元件對齊 OD、商品資料自動 DB 帶、不手刻 per-product 靜態 HTML"
    - "D1=A:適用車款表照 DB fitments 原樣、3 欄(車廠 / 車型 modelCode / 年式)無車系欄、全車種列進去不截斷"
    - "D3=A:picker/規格走真變體、OD 只視覺皮;12K 收進紋路(無獨立特殊欄)、12K→亮光only 由真資料 disable(非照搬 enforceSurface/GLOSSY_ONLY 寫死)"
    - "Q1 override(Sean 2026-06-02):N°03 留相關商品、FAQ 變 N°04 放下面(+ FAQPage JSON-LD 同格式)"
  slices_done:
    - "OD-0:偵察(無碼)"
    - "OD-1:地基 — tokens.css +--c-gold(#a98a4a;模板字面 vs HANDOFF §5 #b48a47 取模板、NORTHSTAR .css>docs 仲裁)+--f-display;layout.tsx +Antonio 字體;product-page.css OD §6 通用標題系統(.pd-section/.pd-eyebrow+.pd-eb-*/.pd-h2/.pd-lead/.pd-body、含舊扁平 eyebrow fallback)+ .pd-main 基礎 grid(等高/斷點遷移留 OD-2/OD-11)"
    - "OD-2:Hero 圖庫換皮 + 桌機等高(CSS-only、ProductGallery.tsx 不動)— product-page.css 圖庫段字面從 OD §5 直接搬:.pd-hero-img 直角+灰底+細框(去 radius18/漸層)、.pd-thumbs flex→5格 grid、.pd-thumb-btn 直角細框圖不調暗、.pd-hero-counter 深底白字 mono;.pd-gallery 去 sticky + ≥1080 flex 左右等高(hero flex:1 撐右欄高、解 HANDOFF §4);箭頭/badge PCM 既有增強 radius→0 對齊直角(保留功能);保留 React swipe/lightbox 不移植 vanilla JS;901-1079 過渡帶 align-self:start 兜空隙(斷點遷移留 OD-11)"
    - "OD-3:右欄資訊換皮(CSS-only、ProductInfo.tsx 不動)— product-page.css 資訊段字面從 OD §5 直接搬:.pd-info sticky top:96px(≤1079 static)、.pd-sku mono 大寫 11px、.pd-title clamp 26-38px 700、.pd-sub 14px、.pd-price-block 上下細線、.pd-price 32px 700 tabular、購買列(.pd-buy-row/.pd-qty/.pd-add-btn/.pd-like/.pd-buynow-btn)去 pill radius 100→0 直角化 + like 圓→方 + token 化;#161 永遠可點移除 dead .is-disabled/:disabled rule;tier 經銷/折扣子樣式 token+直角(RPM general 不顯)。**不含** picker(.pd-opt/.pd-size-btn → OD-4b)/ 服務區(.pd-services → OD-5)"
    - "OD-4a:selectedVariant 狀態提升 + Hero 變體換圖(行為改、Sean 附帶要求)— selectedVariant 由 ProductInfo local state 提升至 ProductPage(受控源頭);ProductInfo 改受控(收 selectedVariant + onSelectVariant props、移除 local useState + reset effect、selectSpec 改呼 onSelectVariant、只持 qty/liked);ProductGallery 收 optional selectedVariant、有變體圖則顯變體圖(RPM 每變體 ~5 張、選紋路→看該變體照片)、無則 fallback product.images→seed;ProductPage 持 state + product 變更 reset + displayPrice + mobile buybar 改用真選中變體 sku/price(修 16c-3 buybar 只能用預設變體限制);ProductInfo.test 加 stateful harness(受控後點擊換價可驗)、ProductGallery.test +變體換圖測;三綠 + 完整 pnpm test 507(+1)全綠。檔案 ProductPage~365/ProductInfo~265/ProductGallery~264 皆 <400"

# Cross-cutting business overrides(全站機制、不屬單一元件)
cross_cutting_overrides:
  globalRwdMechanism:
    design_value: "純 [data-mobile=\"true\"] attribute selector(design SPA 由 MobileWrapper 包 <div data-mobile=\"true\">)"
    storefront_value: |
      雙保險:
      1. @media (max-width: 1079px) — viewport-based、SSR-safe、無需 JS
      2. <html data-mobile> 由 layout.tsx headers() UA regex 設(SSR hint、向後相容既有 [data-mobile] selector)
      5 個既有 css 檔(account / auth / filter-drawer / filter-top / header)全部 [data-mobile] 規則加 @media 鏡像並存、不刪既有規則
    decided_at: "2026-05-28"
    decision_source: "#192 plan v2(codex k1 FIX-1 修 selector + FIX-4 鐵則 4 三段不可拆豁免)"
    reason: |
      storefront 真實 markup 無人設 [data-mobile=\"true\"](g-2 肉眼驗實證 /account 手機爆版),
      純 attribute selector 不啟動;@media + UA hint 雙保險 SSR-safe + dev-preview 仍可強制 attr 模式

