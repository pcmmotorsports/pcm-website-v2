    - "OD-13:FAQ 詢問欄位內文修正(ProductFAQ.tsx order/leadtime + data/rpm-policies.ts 保固;Sean 2026-06-03 提供修正內文)。① order『下單』行改『確認商品是否適用後直接下單即可,如不確定歡迎直接 LINE 我們確認商品適用性與交期。』(原『選好紋路與表面後…確認貨況與交期』;付款/運費不變);② leadtime 整段改『預購商品為〔下定後與原廠訂購〕,需等待 2–6 週不等,部分商品等待時間較長,預估等待時間以詢問時回報之時間為準。』(原『大多數…2–6 週;客製…1–4 個月…』);③ 保固(rpm-policies RPM_WARRANTY_PARAGRAPHS、ProductTabs+ProductFAQ 共用單一真相):Sean 把原第 2 段拆成兩段(『…我們會負責換貨處理。』|『退換貨時商品需維持…』)、3 段→4 段;**第 1 段 + 鑑賞期法律段(消保法 §19 第 1 項)逐字不變**(Sean 仍確認準確性、本次只拆段提升可讀性、非改法律字面)。標點正規化對齊產品頁家族(全形逗號→半形 / 範圍 2-6→2–6 + 空格 / LINE 前後空格)、保留 Sean 用詞。FAQPage JSON-LD 隨 FAQ_ITEMS plainAnswer 自動同步。三綠全綠(typecheck turbo 7/7 + scripts tsc 0 / lint turbo 10/10 / build storefront 1/1 / 完整 pnpm test 81 檔 545 測不變〔純內容改、保固/FAQ 既有斷言字面仍含〕)。follow-up commit 記可達祖先 9b21a8e(OD-12d)、未 push;⚠️ 視覺需 Sean 真機驗(主樹 :3001 合併後展開 FAQ + 保固分頁)"

