        reason: "讀路徑階段③未做、不導 OrderCompletePage;最小成功狀態借 design 字面、零價零洩漏(displayId 來自零價 PlaceOrderResult)。**②-④ 補 processing 變體(net-new、design 無此狀態)**:orphan/charge_unknown/locked → eyebrow『N°ORDER · PROCESSING』+ 主標『付款處理中』+ message(action 文案常數單一真相『付款已收或處理中,請勿重複付款…』)+ 單號;cart 已清(防殘留誘導重刷、②-⑥ webhook 收斂)。**②-④ fix 補 unknown 變體(net-new、審查側鐵則 12 BLOCKER)**:action throw/回應遺失 → eyebrow『N°ORDER · UNKNOWN』+ 主標『付款狀態確認中』+ 文案『付款狀態未知,請勿重複付款,客服 LINE 將協助確認』、**無單號**(回應遺失、client 不知 displayId)、cart 已清、終態勿重複付款(可能已扣款、靠 ②-⑥ 對帳)。卡欄載入中/錯誤態/『卡片資訊由 TapPay 安全欄位加密處理…』三段 net-new 工程文案見 TapPayCardFields。**3DS-3 補 failed 變體(net-new、design 無此狀態)**:3DS callback settleCharge 明確未成功(markFailed 釋鎖)→ eyebrow『N°ORDER · FAILED』+ 主標『付款未完成』+ message『這筆付款未完成,購物車已為你保留,可重新結帳…』+ 單號(供客服)+ CTA『返回購物車』/cart(失敗不清車、車保留可立即重結帳、Sean D4)。**3DS-3 CheckoutSuccess 第二渲染點 = app/checkout/callback/page.tsx**(TapPay 3DS frontend_redirect_url 瀏覽器導回的 Server Component 完成頁、復用本元件 paid/processing/failed 變體;完整 OrderCompletePage 視覺 polish 仍留階段②/Sean、A1=A)"
      - field: "checkoutCallbackPolling"
        design_value: "design 無 3DS callback 輪詢/確認中『終態頁』(submitOrder CheckoutPage.jsx L121-141 為 setTimeout 1200ms 假 TapPay 同步成功 → 直接導 OrderCompletePage);僅送出鈕有瞬時 loading『處理中…』(CheckoutPage.jsx L600/677 processing 三元)、無背景輪詢/自動跳轉/異步結算態"
        storefront_value: "🔴 net-new(3DS-S2/S2b、design 無此態、權威=設計包 §5.1/§5.5):callback owned pending 變體掛 PollOrderStatus 背景輪詢 GET /api/orders/[orderId]/payment-status〔own-only RLS + 應用層 .eq customer_user_id、getUser 驗 JWT、select 只取 payment_status、回應只含 {status} 零金額零 PII、404/401/500 null body〕、退避有界 13 次≈51.5s、paid→router.refresh() 自動跳成功頁;fail-closed 查無/超時不偽 paid 不偽 failed。🔴 **S2b(Sean Q1=B)端點 own-only 第一讀後、訂單 raw payment_status==='unpaid' 時,過 per-order durable throttle 閘(claim_order_poll_settle RPC、payment_confirmer 窄權、同 orderId 窗內最多放行一次、防會員 spam 打爆 TapPay Record;閘對齊 4a-2 claim:unpaid + 非 manual + ceiling<8)後主動呼一次 settleCharge〔第四路 caller、不改 settleCharge 內部、cookieless getSettleChargeDeps()〕→ 再 own-only 重讀回 {status};settleCharge 回的 displayId/金額/outcome 絕不入回應;partiallyPaid/refunded 不觸發 settle;throttle RPC / settleCharge throw → fail-closed skip(不 500 不偽 paid)。Q3=A throttle 10s;Q2=A migration 不 db push(正式暫無 RPC 時 fail-closed 退回只讀)〕。文案拆分(codex K1 must-fix):owned pending=OWNED_PENDING_MSG〔§5.5 已收到付款語意 + 銀行授權為正常 + 勿重複付款、僅已歸屬可斷言〕;泛用態/no_attempt=中性 PROCESSING_MSG〔不謊稱已收款〕"
        decided_at: "2026-06-21"
        decision_source: "設計包 docs/specs/2026-06-20-m3-3ds-auth-settlement-redesign.md §5.1/§5.5 + S2 plan docs/specs/2026-06-21-m3-3ds-s2-callback-polling-plan.md + S2b plan docs/specs/2026-06-21-m3-3ds-s2b-poll-settle-throttle-plan.md + codex 關卡1 雙輪 PASS(S2 文案拆分 + S2b throttle 三閘對齊 4a-2)"
        reason: "3DS 異步結算:callback 首次 settleCharge 常因 Record API 同步延遲落 pending;背景輪詢成立後無感自動跳成功頁。🔴 S2b=Sean 拍 Q1=B 達成設計包 §5.1『幾秒無感成立』:輪詢端點為第四路 settleCharge caller(不改其內部)、Record 同步後下一輪即成立;硬前置=durable per-order throttle 防會員 spam 打爆 Record(獨立 last_poll_settle_at 欄 + claim_order_poll_settle 窄權 RPC、不重用 4a-2 sweeper 欄〔settle_attempt_count ceiling 誤標 manual + next_settle_at 退避踩亂、plan §5.1〕)。Q2=A 不單推 db push(正式結帳 flag 鎖、S6 開放時統一);Q3=A throttle 10s"
      - field: "checkoutManualRedirectFallback"
        design_value: "design 無付款 redirect / 等待 / 『未自動跳轉』畫面(grep payment_url/redirect/繼續付款/正在前往 0 命中;submitOrder 為 setTimeout 假同步、無整頁跳轉態)"
        storefront_value: "🔴 net-new(#239、P2、pivot A 整頁 redirect):CheckoutRedirecting 加手動 <a href={payment_url}>『未自動跳轉?點此繼續付款 →』。auto window.location.assign 被瀏覽器擋(部分行動/隱私瀏覽器擋程式化導航)時客人卡頁→手動鈕使用者手勢觸發整頁跳 TapPay(同 auto 目的地);同頁導向非 target=_blank→無 reverse tabnabbing;payment_url 僅進 href(導向用、非可見文字、不 log);沿用既有 btn-primary co-success-cta 樣式(同 CheckoutSuccess 返回購物車鈕)+ 文案 L2 hardcode"
        decided_at: "2026-06-27"
        decision_source: "Sean 2026-06-27 拍 A(pivot A popup→整頁 redirect;handoff 2026-06-27-payment-arch-research);canonical v10 §6.4;adversarial-reviewer PASS(href token 在 auto 必然暴露面內、isHttpsUrl 已 gate redirectUrl 無 open-redirect)"
        reason: "整頁 redirect 唯一路徑;auto 被擋的 fallback 防客人卡死無法付款;design 無此態→沿用既有 CTA override family(checkoutSuccessInPageMinimal/checkoutCallbackPolling)、open drift 誠實揭示"
      - field: "checkoutInflightSoftPrompt"
        design_value: "design 無『付款進行中』偵測 / 軟提醒(submitOrder 為 setTimeout 假同步、無另開分頁防呆概念)"
        storefront_value: "🔴 net-new(P3、pivot A 整頁 redirect 另開分頁防呆、Q1=A 軟提醒/Q2=6 分):跳 TapPay 前 useChargePayment redirect 分支 setPaymentInflight 寫 localStorage 記號 {cartSessionId,ts}(6 分 TTL);下次結帳 CheckoutView handleSubmit confirmProceedIfInflight → 有未過期記號則 window.confirm『你有一筆付款可能還在進行中…確定要再付一次嗎?』可繼續(清舊記號續送)/取消(不送);callback paid/failed/no_attempt 掛 ClearPaymentInflight 清記號(pending 不掛=仍進行中);壞值/逾時/localStorage 不可用 fail-safe 不炸結帳。🔴 誠實定位=client UX 提示層、非雙扣防線(後端 §2.3 R3 preflight 才是真防線);window.confirm 為最簡 L2 呈現、可後續換自訂 modal"
        decided_at: "2026-06-27"
        decision_source: "Sean 2026-06-27 拍 Q1=A 軟提醒/Q2=6 分;canonical v10 §6.4/§9 A3/§2.3 二刷收斂註記;adversarial-reviewer + code-reviewer 雙審"
        reason: "整頁 redirect 消滅同分頁二刷主向量、殘餘=客人另開分頁雙刷;P3 軟提醒減少困惑與重複打 server(後端 preflight 已防真雙扣);design 無此態→沿用 net-new override family、open drift 誠實揭示"
      - field: "checkoutPlaceOrderZeroPriceLines"
        design_value: "submitOrder 為純前端 mock、不打後端、無建單型別契約"
        storefront_value: "🔴 client→server 只送 {variantId, quantity}(PlaceOrderLinesInput zod + PlaceOrderLine 型別層零價零 tier);價/tier/身分全 server 權威(create_order RPC auth.uid() + price_general + tier_at_checkout 恆 general);catch 吞 RPC RAISE(下架/錯價/IDOR;🔴 #214a 缺貨改快照不擋)回單一通用字面、絕不透傳原文;成功才 clear()、失敗保留 cart"
        decided_at: "2026-06-07"
        decision_source: "鐵則 12 + 審查側 pre-flight MUST/SHOULD(getUser 純 gate 不傳 user.id、catch 不洩 RPC RAISE)+ memory security-audit H-1(tier server 端)"
        reason: "建單最敏感面:client 永不送價/tier/身分;經銷價零外洩(client bundle grep price_store/price_by_tier 零命中)"
