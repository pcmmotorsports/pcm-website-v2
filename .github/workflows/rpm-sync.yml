# 供應商每日同步(報價單 B庫 → 網站庫)— S5 排程上線;V1 多供應商 matrix(2026-07-05)
#
# 每天台灣 12:30(UTC 04:30)自動跑全量同步 + S4 下架對賬 + V1 變體級對賬 + S5 W1 抓取完整性 gate。
# 🔴 2026-07-22 由台灣 03:00 改為 12:30(需求單:報價單 repo docs/handoff/REQ-2026-07-22-網站庫同步時間.md)。
#   原因:報價單側 2026-07-22 把爬蟲排程整批搬到清晨(台灣 03:30-04:20 十二家爬蟲 → 06:00 分類重算
#   → 11:30 報價單庫→網站庫 fitment 同步)。12:30 在上述四段的**排程順序之後**。
#   ⚠️ 不可再往前搬到 11:30 之前,否則退回同一個問題。
#
# 🔴 **舊排程的真實症狀比需求單描述的更糟(2026-07-22 以 28 次歷史執行實測、非推論)**:
#   舊 cron 表訂台灣 03:00,但 GitHub 排程延遲實測 **最小 55 分 / 中位 72 分 / 最大 111 分**
#   → 實際開跑落在 **台灣 03:55-04:51**,正好**壓在爬蟲視窗 03:30-04:20 之內或其後緣**。
#   所以舊行為不是需求單寫的「必然拿到前一天資料」,而是**讀到「爬蟲還在寫」的部分更新狀態**
#   (某些供應商已更新、某些還沒)。新排程把這個重疊完全消除。
#
# 🔴 **誠實邊界:12:30 只是「排在上游之後」,不是「上游已完成」的保證。** 兩個 repo 之間
#   **沒有任何完成訊號 / preflight / 失敗閘**,本 workflow 不會知道上游有沒有跑成功:
#   ① 報價單側防睡鎖 caffeinate 只覆蓋台灣 03:22-07:17(見該 repo launchd/com.pcm.morning-awake.plist),
#      **11:30 的 fitment 同步落在防睡鎖放開之後 4 小時**、該機 pmset 閒置 1 分鐘即睡
#      → 可能發生該 plist 註解自述的「跑起來但網路不通的假失敗」(2026-07-22 lightech/samco-stock 即此下場)。
#   ② 11:30 若失敗或延遲,12:30 仍會照跑並同步到**更舊**的 fitment。
#   → 上游完成訊號 / preflight 是**未做的工作**,已於 2026-07-22 raise 給 Sean(跨 repo、非本 repo 可單獨解)。
# plan:docs/specs/2026-06-03-S5-scheduling-plan.md(Sean 拍 Q-S5-platform=A)。
# V1 matrix(2026-07-05 雙跨模型審查 must-fix、Sean 拍 gbracing+bonamici 上架):每家一個獨立 job
#   跑「自己完整一輪」(不變式 1 軟下架隔離);fail-fast:false = 一家 gate abort 不拖垮別家;
#   max-parallel:1 = 序列寫同一 DB、降低併發寫入面。matrix 涵蓋全 writeAllowed=true 品牌(2026-07-12 Sean 拍「所有品牌每日同步」);lightech 除外(writeAllowed=false、#275)。
#
# ⚠️ 已知陷阱:GitHub scheduled workflow 60 天無 repo 活動會被自動 disable(**本 repo 實查為 public、規則適用**)
#   (無人值守需週期性 repo 活動或定期到 Actions 頁確認仍啟用)。
# 告警:失敗走 GitHub Actions 預設 email(寄給上次改本檔者);LINE/webhook 升級留 follow-up。
#
# 🔴 安全:secrets 走 ${{ secrets.* }} 注入 env、絕不 echo 到 log;只用已驗 action;
#   on 限 schedule + workflow_dispatch(不掛 pull_request/pull_request_target、secret 不給 fork PR);
#   permissions 收最小(contents: read、本 job 不寫 repo)。
# secret 設定步驟見 docs/specs/2026-06-03-S5-scheduling-plan.md §10(Sean dashboard 操作、Code 不碰金鑰值)。

name: Supplier Daily Sync

on:
  schedule:
    # ⚠️ **本檔未設 timezone → 走 GitHub 預設的 UTC**;勿在此填台灣時間。
    #   UTC 04:30 = 台灣**同日** 12:30(UTC+8 全年無夏令時)。
    #   (前值 '0 19 * * *' = UTC 19:00 = 台灣**次日** 03:00;2026-07-22 改,理由見檔頭。)
    # ⚠️ 排程時間是**最早觸發時間、不是保證**:GitHub 高負載時會延遲、甚至**整次丟棄**,官方未給上限。
    #   🔴 **本 workflow 實測(2026-07-22、28 次 schedule 觸發):延遲 最小 55 分 / 中位 72 分 / 最大 111 分。**
    #   → 表訂台灣 12:30 的**實際開跑預期 ≈ 台灣 13:25-14:21**(仍安全落在 11:30 fitment 同步之後、餘裕約 2 小時)。
    #   ⚠️ 寫「12:30 跑」是表訂值;要講實際行為請用 13:25-14:21。延遲量取決於當下 GitHub 負載、不保證。
    #   缺跑偵測目前**沒有**(見下方告警段)。
    - cron: '30 4 * * *'
  workflow_dispatch: # 手動觸發(GitHub 預設限有 write 權限的 collaborator)

# W2 並發互斥:cancel-in-progress:false = 不 cancel 進行中(reconcile 寫到一半被砍會留髒中間態)。
# 🔴 更正(2026-07-22 codex 審查):原註解「後到的 run 排隊」不精確 —— GitHub 同一 concurrency group
#   最多保留 **1 個 running + 1 個 pending**;第三個 run 會**取代**既有 pending(該次等於被丟棄)。
#   排程與 workflow_dispatch 重疊時可能漏掉一次同步,且不會有失敗通知。
concurrency:
  group: rpm-sync
  cancel-in-progress: false

# 最小權限:本 job 只讀 repo(checkout)+ 對外連 Supabase、不寫 repo。
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 一家 gate abort(如 #261 新分類)不中斷其他家同步(審查 S1:防跨供應商耦合)
      max-parallel: 1 # 序列跑:同一 target DB、避免併發寫入面(各家 scope 本已隔離、此為保守層)
      # 🔴 總執行時長實測(2026-07-22、近 12 次執行):**0.17-0.22 小時 = 約 10-13 分鐘**(整個 matrix 12 家序列跑完)。
      #   → 各 job 6h 上限推出的「最壞 72 小時」是理論值、與實況差兩個數量級;12:30 開跑約 13:40 前結束。
      matrix:
        supplier: [rpm, gbracing, bonamici, cncracing, evotech, eazigrip, samco, motogadget, front3d, materya, ebc, akrapovic] # 全 writeAllowed=true 品牌(2026-07-12 Sean 拍「所有品牌每日同步」);lightech 除外(writeAllowed=false、#275);akrapovic 2026-07-19 首灌 648 群驗證通過後加入(runbook §5 全過);samco 14165 變體序列跑較久但各 job 6h 上限
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false # 同步腳本不需 design-reference submodule

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run supplier sync (full + S4 reconcile + V1 variant reconcile + S5 W1 gate)
        # secrets 注入 env;runner 無 .env.local、rpm-import existsSync 守會走此 process.env(S5-pre B1)。
        env:
          QUOTE_SUPABASE_URL: ${{ secrets.QUOTE_SUPABASE_URL }}
          QUOTE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.QUOTE_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: pnpm exec tsx scripts/rpm-import.ts --confirm-write --supplier=${{ matrix.supplier }} # tsx 已釘 devDep(--frozen-lockfile 裝固定版、不每天抓 latest、防供應鏈)

  image-trim-scan:
    needs: sync
    if: ${{ !cancelled() }} # cancel 時不跑、sync 部分失敗仍跑(docs/specs/2026-07-19-product-image-trim-plan.md §4)
    continue-on-error: true # 掃描失敗不影響主同步(獨立 job)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false # 同步腳本不需 design-reference submodule

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run product image trim scan (incremental)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: pnpm exec tsx scripts/image-trim-scan.ts --confirm-write --limit=800
