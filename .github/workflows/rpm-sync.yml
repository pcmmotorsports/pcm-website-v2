# RPM 每日同步(報價單 B庫 → 網站庫)— S5 排程上線
#
# 每天台灣 03:00(UTC 19:00)自動跑全量同步 + S4 下架對賬 + S5 W1 抓取完整性 gate。
# plan:docs/specs/2026-06-03-S5-scheduling-plan.md(Sean 拍 Q-S5-platform=A)。
#
# ⚠️ 已知陷阱:GitHub scheduled workflow 60 天無 repo 活動會被自動 disable
#   (無人值守需週期性 repo 活動或定期到 Actions 頁確認仍啟用)。
# 告警:失敗走 GitHub Actions 預設 email(寄給上次改本檔者);LINE/webhook 升級留 follow-up。
#
# 🔴 安全:secrets 走 ${{ secrets.* }} 注入 env、絕不 echo 到 log;只用已驗 action;
#   on 限 schedule + workflow_dispatch(不掛 pull_request/pull_request_target、secret 不給 fork PR);
#   permissions 收最小(contents: read、本 job 不寫 repo)。
# secret 設定步驟見 docs/specs/2026-06-03-S5-scheduling-plan.md §10(Sean dashboard 操作、Code 不碰金鑰值)。

name: RPM Daily Sync

on:
  schedule:
    # ⚠️ GitHub Actions cron 一律 UTC、勿填台灣時間。UTC 19:00 = 台灣次日 03:00(UTC+8 全年無夏令時)。
    - cron: '0 19 * * *'
  workflow_dispatch: # 手動觸發(GitHub 預設限有 write 權限的 collaborator)

# W2 並發互斥:後到的 run 排隊、不 cancel 進行中(reconcile 寫到一半被砍會留髒中間態)。
concurrency:
  group: rpm-sync
  cancel-in-progress: false

# 最小權限:本 job 只讀 repo(checkout)+ 對外連 Supabase、不寫 repo。
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false # 同步腳本不需 design-reference submodule

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run RPM sync (full + S4 reconcile + S5 W1 gate)
        # secrets 注入 env;runner 無 .env.local、rpm-import existsSync 守會走此 process.env(S5-pre B1)。
        env:
          QUOTE_SUPABASE_URL: ${{ secrets.QUOTE_SUPABASE_URL }}
          QUOTE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.QUOTE_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: pnpm exec tsx scripts/rpm-import.ts --confirm-write # tsx 已釘 devDep(--frozen-lockfile 裝固定版、不每天抓 latest、防供應鏈)
